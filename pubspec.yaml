name: chongmi
description: 情侣恋爱记录 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # LeanCloud
  leancloud_storage: ^0.8.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 微信分享
  fluwx: ^4.6.0

  # 图片相关
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 地图
  tencent_map_fluttify: ^0.0.5

  # 工具
  intl: ^0.19.0
  uuid: ^4.2.1
  path_provider: ^2.1.2

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
