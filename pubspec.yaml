name: chongmi
description: 情侣恋爱记录 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 图片相关
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 工具
  intl: ^0.19.0
  uuid: ^4.2.1
  path_provider: ^2.1.2

  # UI
  cupertino_icons: ^1.0.6
  
  # 动画与微交互
  lottie: ^3.1.2
  animate_do: ^3.3.4
  like_button: ^2.0.8

  # 图片与布局增强
  extended_image: any
  waterfall_flow: any

  # 日历与时间线
  table_calendar: ^3.1.2
  timeline_tile: ^2.0.0

  # 图表分析
  fl_chart: ^0.68.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

